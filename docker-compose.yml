

services:

  postgres:
    image: postgres:16

    container_name: swiftmart-postgres

    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: swiftmart_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7-alpine

    container_name: swiftmart-redis

    restart: always

  auth-service:
    build: ./services/auth-service

    container_name: auth-service

    ports:
      - "5001:5001"

    env_file:
      - ./services/auth-service/.env.docker

    depends_on:
      - postgres

  product-service:
    build: ./services/product-service

    container_name: product-service

    ports:
      - "5002:5002"

    env_file:
      - ./services/product-service/.env.docker

    depends_on:
      - postgres
      - redis

  order-service:
    build: ./services/order-service

    container_name: order-service

    ports:
      - "5003:5003"

    env_file:
      - ./services/order-service/.env.docker

    depends_on:
      - postgres

  cart-service:
    build: ./services/cart-service

    container_name: cart-service

    ports:
      - "5004:5004"

    env_file:
      - ./services/cart-service/.env.docker

    depends_on:
      - postgres

  notification-service:
    build: ./services/notification-service

    container_name: notification-service

    ports:
      - "5005:5005"

    env_file:
      - ./services/notification-service/.env.docker

    depends_on:
      - postgres

  frontend:
    build: ./frontend

    container_name: swiftmart-frontend

    ports:
      - "80:80"

    depends_on:
      - auth-service
      - product-service
      - order-service
      - cart-service
      - notification-service

volumes:
  postgres_data:
