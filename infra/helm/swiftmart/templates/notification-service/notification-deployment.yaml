apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      serviceAccountName: notification-service-sa
      containers:
        - name: notification-service
          image: "{{ .Values.images.notificationService.repository }}:{{ .Values.images.notificationService.tag }}"
          imagePullPolicy: {{ .Values.images.notificationService.pullPolicy }}
          ports:
            - containerPort: 5005
          envFrom:
            - configMapRef:
                name: notification-config
            - secretRef:
                name: notification-secret
          resources:
              requests:
                  cpu: "100m"
                  memory: "128Mi"
              limits:
                  cpu: "500m"
                  memory: "512Mi"
          readinessProbe:
              httpGet:
                  path: /health
                  port: 5005
              initialDelaySeconds: 10
              periodSeconds: 5

          livenessProbe:
              httpGet:
                 path: /health
                 port: 5005
              initialDelaySeconds: 20
              periodSeconds: 10
