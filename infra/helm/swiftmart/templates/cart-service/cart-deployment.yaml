apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart-service
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cart-service
  template:
    metadata:
      labels:
        app: cart-service
    spec:
      containers:
        - name: cart-service
          image: "{{ .Values.images.cartService.repository }}:{{ .Values.images.cartService.tag }}"
          imagePullPolicy: {{ .Values.images.cartService.pullPolicy }}
          ports:
            - containerPort: 5004
          envFrom:
            - configMapRef:
                name: cart-config
            - secretRef:
                name: cart-secret

          resources:
              requests:
                cpu: "100m"
                memory: "128Mi"
              limits:
                cpu: "500m"
                memory: "512Mi"
          readinessProbe:
              httpGet:
                  path: /health
                  port: 5004
              initialDelaySeconds: 10
              periodSeconds: 5

          livenessProbe:
              httpGet:
                path: /health
                port: 5004
              initialDelaySeconds: 20
              periodSeconds: 10
