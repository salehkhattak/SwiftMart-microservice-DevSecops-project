apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: swiftmart
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/salehkhattak/SwiftMart-microservice-DevSecops-project.git
    targetRevision: main
    path: infra/helm/swiftmart

  destination:
    server: https://kubernetes.default.svc
    namespace: swiftmart

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
