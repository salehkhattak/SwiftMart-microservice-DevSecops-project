apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: swiftmart
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: swiftmart-auth-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5001
          envFrom:
            - configMapRef:
                name: auth-config
            - secretRef:
                name: auth-secret
          resources:
              requests:
                 cpu: "100m"
                 memory: "128Mi"
              limits:
                 cpu: "500m"
                 memory: "512Mi"

          readinessProbe:
            httpGet:
                path: /health
                port: 5001
            initialDelaySeconds: 10
            periodSeconds: 5

          livenessProbe:
              httpGet:
                path: /health
                port: 5001
              initialDelaySeconds: 20
              periodSeconds: 10